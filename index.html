<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bio | Fellipe Rejlander</title>
    <script src="https://unpkg.com"></script>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ededed;
            --accent: #3b82f6; /* Azul Tech */
            --border: #262626;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
            color: var(--text);
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }
        .profile {
            grid-column: span 2;
            text-align: center;
        }
        .profile img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 10px;
            border: 2px solid var(--accent);
        }
        .profile h1 { font-size: 1.5rem; margin: 0; }
        .profile p { color: #888; font-size: 0.9rem; margin: 5px 0; }
        
        .full-width { grid-column: span 2; flex-direction: row; align-items: center; gap: 15px; }
        .icon { color: var(--accent); margin-bottom: 10px; }
        .full-width .icon { margin-bottom: 0; }
        
        h3 { font-size: 0.9rem; margin: 0; font-weight: 600; }
        span { font-size: 0.75rem; color: #888; }
    </style>
</head>
<body>

        " class="card email-card" target="_blank" rel="noopener noreferrer" aria-label="Enviar e-mail para suporte">
