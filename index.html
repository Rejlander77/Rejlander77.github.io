    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --text: #ededed;
            --accent: #3b82f6; /* Azul Tech */
            --border: #262626;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: 0.3s;
            text-decoration: none;
            color: var(--text);
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }
        .profile {
            grid-column: span 2;
            text-align: center;
        }
        .profile img {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 6px solid #ffffff;
            box-shadow:0 10px 30px rgba(0, 0, 0, 0.4);
            Display: block;
            margin-left: auto;
            margin-right: auto;
            transition: all 0.3s ease;
        }
      /* Efeito ao passar o mouse (expandir) */
.profile img:hover {
    transform: scale(1.08);
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
}

.profile h1 {
    font-size: 1.5rem;
    margin: 0;
}

.profile p {
    color: #888;
    font-size: 0.9rem;
    margin: 5px 0;
}
