<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fellipe Rejlander - Especialista em Segurança</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ESTILO DO FUNDO COM SUA IMAGEM 1.PNG */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgba(10, 15, 20, 0.88 ), rgba(10, 15, 20, 0.88)), 
                        url('https://Rejlander77.github.io/1.png' );
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* CARD COM EFEITO DE VIDRO FOSCO (GLASSMORPHISM) */
        .card.profile {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
        }

        /* FOTO PRINCIPAL AUMENTADA */
        .card.profile img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid #00d4ff;
            margin-bottom: 25px;
            object-fit: cover;
            box-shadow: 0 0 25px rgba(0, 212, 255, 0.4);
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 12px;
            font-size: 32px;
            letter-spacing: -1px;
            font-weight: 700;
        }

        .description {
            font-size: 17px;
            line-height: 1.6;
            color: #bdc3c7;
            margin-bottom: 10px;
        }

        .prizm-tag {
            font-size: 14px;
            color: #00d4ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        /* LINKS SOCIAIS */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
        }

        .social-links a {
            color: #ecf0f1;
            font-size: 32px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .social-links a:hover {
            color: #00d4ff;
            transform: scale(1.3);
        }

        /* BOTÃO DE CONTATO PRINCIPAL */
        .btn-whatsapp {
            display: inline-block;
            background: linear-gradient(135deg, #00d4ff, #008fb3);
            color: #0a0f14;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            margin-top: 35px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-whatsapp:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card profile">
            <!-- Foto de Perfil (1.png) -->
            <img src="https://Rejlander77.github.io/1.png" alt="Fellipe Rejlander">
            
            <h1>Fellipe Rejlander</h1>
            
            <p class="description">Especialista em dispositivos de segurança e soluções de monitoramento inteligente.</p>
            
            <p class="prizm-tag">CRIADOR DO PRIZM SCAN 2.0</p>

            <div class="social-links">
                <!-- WHATSAPP -->
                <a href="https://wa.me/5511945412377?text=Olá%20Fellipe,%20gostaria%20de%20solicitar%20um%20diagnóstico%20de%20rede%20e%20segurança." target="_blank" title="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                </a>

                <!-- LINKEDIN -->
                <a href="https://www.linkedin.com/in/fellipe-rejlander-81232b217/" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
                
                <!-- E-MAIL COM CAMPOS DE NOME, SERVIÇO E PRIORIDADE -->
                <a href="mailto:frejlander@gmail.com?subject=Solicitação de Serviço - Prizm Scan&body=Nome: %0A%0AManutenção ou Instalação: %0A%0ANível de Prioridade (Baixa | Média | Alta ): " title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>

            <!-- BOTÃO DE CONTATO RÁPIDO -->
            <a href="https://wa.me/5511945412377?text=Olá%20Fellipe,%20gostaria%20de%20solicitar%20um%20diagnóstico%20de%20rede%20e%20segurança." target="_blank" class="btn-whatsapp">
                Falar com Especialista
            </a>
        </div>
    </div>

</body>
</html>
