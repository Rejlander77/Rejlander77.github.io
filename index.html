<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fellipe Rejlander - Especialista em Segurança</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ESTILO DO FUNDO ULTRA ESTILIZADO */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, rgba(10, 15, 20, 0.7 ) 0%, rgba(5, 5, 5, 1) 100%), 
                        url('https://Rejlander77.github.io/1.png' );
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ecf0f1;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* CARD COM EFEITO DE VIDRO PROFUNDO E BORDA NEON */
        .card.profile {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 212, 255, 0.15);
            border-radius: 35px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0, 212, 255, 0.05);
            position: relative;
        }

        /* FOTO PRINCIPAL COM ZOOM E BRILHO */
        .card.profile img.avatar {
            width: 200px;
            height: auto;
            border-radius: 20px;
            border: 3px solid #00d4ff;
            margin-bottom: 25px;
            object-fit: contain;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card.profile img.avatar:hover {
            transform: scale(1.1) rotate(2deg);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.6);
        }

        h1 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 32px;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .description {
            font-size: 17px;
            line-height: 1.6;
            color: #bdc3c7;
            margin-bottom: 15px;
        }

        .prizm-tag {
            font-size: 14px;
            color: #00d4ff;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        /* FORMULÁRIO ESTILIZADO */
        .form-container {
            margin-top: 30px;
            text-align: left;
            background: rgba(0, 0, 0, 0.4);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            color: #00d4ff;
            margin-bottom: 6px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #00d4ff;
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        /* BOTÃO DE AÇÃO COM PULSAÇÃO */
        .btn-action {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #00d4ff, #008fb3);
            color: #0a0f14;
            padding: 16px;
            border-radius: 50px;
            border: none;
            font-weight: 900;
            margin-top: 25px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }

        .btn-action:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4);
            filter: brightness(1.1);
        }

        /* LINKS SOCIAIS */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 35px;
            margin-top: 30px;
        }

        .social-links a {
            color: #ecf0f1;
            font-size: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .social-links a:hover {
            color: #00d4ff;
            transform: scale(1.3);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card profile">
            <!-- Foto Avatar Estilizada -->
            <img src="https://Rejlander77.github.io/1.png" alt="Fellipe Rejlander" class="avatar">
            
            <h1>Fellipe Rejlander</h1>
            
            <p class="description">Especialista em dispositivos de segurança e soluções de monitoramento inteligente.</p>
            
            <p class="prizm-tag">CRIADOR DO PRIZM SCAN 2.0</p>

            <!-- FORMULÁRIO DE ALTA PERFORMANCE -->
            <div class="form-container">
                <form id="contactForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Nome do Cliente</label>
                        <input type="text" id="name" placeholder="Como devemos te chamar?" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tools"></i> Tipo de Serviço</label>
                        <select id="service">
                            <option value="Instalação">Instalação de Sistema</option>
                            <option value="Manutenção">Manutenção Preventiva/Corretiva</option>
                            <option value="Diagnóstico Prizm Scan">Diagnóstico Prizm Scan 2.0</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-exclamation-triangle"></i> Prioridade do Atendimento</label>
                        <select id="priority">
                            <option value="Baixa">Baixa (Planejamento )</option>
                            <option value="Média">Média (Necessário breve)</option>
                            <option value="Alta (Urgente)">Alta (Urgência Técnica)</option>
                        </select>
                    </div>
                    
                    <button type="button" class="btn-action" onclick="sendForm()">
                        <i class="fas fa-paper-plane"></i> Enviar Solicitação
                    </button>
                </form>
            </div>

            <div class="social-links">
                <a href="https://wa.me/5511945412377?text=Olá!%20me%20chamo:%20(%20 )%20gostaria%20de%20solicitar%20um%20orçamento,%20quando%20está%20disponível?" target="_blank" title="WhatsApp">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <a href="https://www.linkedin.com/in/fellipe-rejlander-81232b217/" target="_blank" title="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="mailto:frejlander@gmail.com?subject=Solicitação de Serviço&body=Olá Fellipe!" title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
    </div>

    <script>
        function sendForm( ) {
            const name = document.getElementById('name').value;
            const service = document.getElementById('service').value;
            const priority = document.getElementById('priority').value;

            if (!name) {
                alert("Por favor, informe seu nome para prosseguir.");
                return;
            }

            const subject = encodeURIComponent(`Solicitação de Serviço: ${service}`);
            const body = encodeURIComponent(
                `SOLICITAÇÃO DE SERVIÇO TÉCNICO\n` +
                `----------------------------------\n` +
                `NOME: ${name}\n` +
                `SERVIÇO: ${service}\n` +
                `PRIORIDADE: ${priority}\n` +
                `----------------------------------\n` +
                `Enviado via Portfólio Prizm Scan.`
            );
            
            window.location.href = `mailto:frejlander@gmail.com?subject=${subject}&body=${body}`;
        }
    </script>

</body>
</html>


</body>
</html>
